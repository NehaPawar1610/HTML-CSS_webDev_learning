<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Type Attribute</title>
</head>
<body>
    <form method="post" action="action.html">
        First name: <input type="text" placeholder="Enter your first name"/> <br/>  
        Username(Uppercase): <input type="text" pattern="[A-Z]+" required/>  <br>
        Job experience: <input type="number" min="2" max="10" step="1"/> <br>
        Upload certificates:<input type="file" multiple/><br>
        Like coding:<input type="text" autocomplete="Yes"/> <br/> 
        Contact: <input type="number" autofocus/><br/>  
        <input type="submit" formmethod="get">
    </form>

   
</body>
</html>
